{% extends "layout.html" %}

{% block content %}

<h2 class="mb-4">Teacher Management</h2>

<div class="card p-4 mb-4">

<h5>Add Teacher</h5>

<form method="POST" action="/add_teacher">

<div class="row">

<div class="col-md-4">
<input class="form-control" name="name" placeholder="Teacher Name">
</div>

<div class="col-md-4">
<input class="form-control" name="subject" placeholder="Subject">
</div>

<div class="col-md-4">
<input class="form-control" name="phone" placeholder="Phone">
</div>

</div>

<button class="btn btn-primary mt-3">Add Teacher</button>

</form>

</div>

<div class="card p-4">

<h5>Teacher List</h5>

<table class="table">

<tr>
<th>Name</th>
<th>Subject</th>
<th>Phone</th>
</tr>

{% for t in teachers %}

<tr>

<td>{{t.name}}</td>
<td>{{t.subject}}</td>
<td>{{t.phone}}</td>

</tr>

{% endfor %}

</table>

</div>

{% endblock %}
