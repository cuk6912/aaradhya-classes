{% extends "layout.html" %}
{% block content %}

<h2>Teachers</h2>

<form method="POST" action="/add_teacher">
<input class="form-control mb-2" name="name" placeholder="Teacher Name" required>
<input class="form-control mb-2" name="subject" placeholder="Subject" required>
<button class="btn btn-success">Add Teacher</button>
</form>

<hr>

<table class="table">
<tr><th>Name</th><th>Subject</th></tr>

{% for t in teachers %}
<tr>
<td>{{t.name}}</td>
<td>{{t.subject}}</td>
</tr>
{% endfor %}

</table>

{% endblock %}
