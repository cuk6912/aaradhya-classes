{% extends "layout.html" %}

{% block content %}

<h2 class="mb-4">Batch Management</h2>

<div class="card p-4 mb-4">

<h5>Create Batch</h5>

<form method="POST" action="/create_batch">

<div class="row g-2">

<div class="col-md-3">
<input class="form-control" name="name" placeholder="Batch Name" required>
</div>

<div class="col-md-2">
<select class="form-control" name="class" required>
<option>1st</option>
<option>2nd</option>
<option>3rd</option>
<option>4th</option>
<option>5th</option>
<option>6th</option>
<option>7th</option>
<option>8th</option>
<option>9th</option>
<option>10th</option>
<option>11th</option>
<option>12th</option>
</select>
</div>

<div class="col-md-2">
<select class="form-control" name="subject" required>
<option>All Subjects</option>
<option>Maths</option>
<option>Science</option>
<option>English</option>
<option>Phonics</option>
<option>Abacus</option>
</select>
</div>

<div class="col-md-2">
<select class="form-control" name="teacher" required>
{% for t in teachers %}
<option value="{{t.id}}">{{t.name}}</option>
{% endfor %}
</select>
</div>

<div class="col-md-2">
<input class="form-control" name="time" placeholder="5 PM" required>
</div>

<div class="col-md-1">
<button class="btn btn-success w-100">Add</button>
</div>

</div>

</form>

</div>

<div class="card p-4">

<h5>Batch List</h5>

<table class="table table-striped">

<tr>
<th>Batch</th>
<th>Class</th>
<th>Subject</th>
<th>Teacher</th>
<th>Time</th>
</tr>

{% for b in batches %}

<tr>

<td>{{b.name}}</td>
<td>{{b.student_class}}</td>
<td>{{b.subject}}</td>
<td>{{b.teacher_id}}</td>
<td>{{b.time}}</td>

</tr>

{% endfor %}

</table>

</div>

{% endblock %}
