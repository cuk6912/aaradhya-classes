{% extends "layout.html" %}

{% block content %}

<h2 class="mb-4">Batch Management</h2>

<div class="card p-4 mb-4">

<h5>Create Batch</h5>

<form method="POST" action="/add_batch">

<div class="row">

<div class="col-md-3">
<input class="form-control" name="batch_name" placeholder="Batch Name">
</div>

<div class="col-md-2">

<select class="form-control" name="class_name">

<option>1st</option>
<option>2nd</option>
<option>3rd</option>
<option>4th</option>
<option>5th</option>
<option>6th</option>
<option>7th</option>
<option>8th</option>
<option>9th</option>
<option>10th</option>
<option>11th</option>
<option>12th</option>

</select>

</div>

<div class="col-md-2">

<select class="form-control" name="subject">

<option>All Subjects</option>
<option>Maths</option>
<option>Science</option>
<option>English</option>
<option>Phonics</option>
<option>Abacus</option>

</select>

</div>

<div class="col-md-2">

<select class="form-control" name="teacher_id">

{% for t in teachers %}

<option value="{{t.id}}">
{{t.name}}
</option>

{% endfor %}

</select>

</div>

<div class="col-md-2">

<input class="form-control" name="time" placeholder="5 PM">

</div>

</div>

<button class="btn btn-success mt-3">Create Batch</button>

</form>

</div>

<div class="card p-4">

<h5>Batch List</h5>

<table class="table">

<tr>
<th>Batch</th>
<th>Class</th>
<th>Subject</th>
<th>Teacher</th>
<th>Time</th>
</tr>

{% for b in batches %}

<tr>

<td>{{b.batch_name}}</td>
<td>{{b.class_name}}</td>
<td>{{b.subject}}</td>
<td>{{b.teacher_id}}</td>
<td>{{b.time}}</td>

</tr>

{% endfor %}

</table>

</div>

{% endblock %}
