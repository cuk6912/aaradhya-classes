<!DOCTYPE html>
<html>

<head>

<title>Aaradhya Classes ERP</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
}

.sidebar{
height:100vh;
width:230px;
position:fixed;
background:#2c3e50;
color:white;
padding:20px;
transition:0.3s;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
margin:10px 0;
padding:8px;
border-radius:4px;
}

.sidebar a:hover{
background:#34495e;
}

.main{
margin-left:250px;
padding:20px;
}

.menu-btn{
display:none;
}

@media (max-width:768px){

.sidebar{
left:-230px;
}

.sidebar.active{
left:0;
}

.main{
margin-left:0;
}

.menu-btn{
display:block;
margin-bottom:15px;
}

}

</style>

</head>

<body>

<div class="sidebar" id="sidebar">

<h4>Aaradhya Classes</h4>

<a href="/">Dashboard</a>

<h6 style="color:#bbb;margin-top:20px">Management</h6>

<a href="/students">Students</a>
<a href="/teachers">Teachers</a>
<a href="/batches">Batches</a>

<h6 style="color:#bbb;margin-top:20px">Academics</h6>

<a href="/attendance">Attendance</a>
<a href="/fees">Fees</a>

<h6 style="color:#bbb;margin-top:20px">Analytics</h6>

<a href="/reports">Reports</a>

<a href="/logout" style="margin-top:30px;color:#ffb3b3">Logout</a>

</div>


<div class="main">

<button class="btn btn-dark menu-btn" onclick="toggleMenu()">☰ Menu</button>

{% block content %}

{% endblock %}

</div>


<script>

function toggleMenu(){

document.getElementById("sidebar").classList.toggle("active")

}

</script>

</body>
</html>
