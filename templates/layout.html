<!DOCTYPE html>
<html>
<head>
    <title>Aaradhya Classes</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        /* DARK MODE */
        body.dark {
            background: #121212;
            color: white;
        }

        body.dark .card {
            background: #1e1e1e;
        }

        /* SIDEBAR */
        .sidebar {
            height: 100vh;
            width: 250px;
            position: fixed;
            top: 0;
            left: 0;
            background: #2c3e50;
            overflow-y: auto;
            z-index: 1000;   /* ✅ FIX */
            transition: 0.3s;
        }

        .sidebar a {
            display: block;
            padding: 12px;
            color: white;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #34495e;
        }

        /* OVERLAY */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
        }

        .overlay.active {
            display: block;
        }

        /* TOPBAR */
        .topbar {
            background: #2c3e50;
            color: white;
            padding: 10px;
            position: sticky;
            top: 0;
            z-index: 1100;
        }

        /* MAIN */
        .main {
            margin-left: 250px;
            padding: 15px;
        }

        /* MOBILE */
        .menu-btn {
            display: none;
            background: #2c3e50;
            color: white;
            border: none;
            padding: 10px;
        }

        @media(max-width:768px){
            .sidebar {
                left: -250px;
            }

            .sidebar.active {
                left: 0;
            }

            .main {
                margin-left: 0;
            }

            .menu-btn {
                display: block;
            }
        }
    </style>
</head>

<body id="body">

<!-- OVERLAY -->
<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<!-- TOPBAR -->
<div class="topbar d-flex justify-content-between align-items-center">

    <button class="menu-btn" onclick="toggleMenu()">☰</button>

    <h5 class="mb-0">Aaradhya Classes</h5>

    <button class="btn btn-sm btn-light" onclick="toggleTheme()">🌙</button>

</div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">

    <div class="text-center mt-3">
        <img src="{{ url_for('static', filename='logo.png') }}" width="100">
    </div>

    <a href="/">Dashboard</a>
    <a href="/students">Students</a>
    <a href="/teachers">Teachers</a>
    <a href="/batches">Batches</a>

    <hr style="color:white">

    <a href="/attendance">Attendance</a>
    <a href="/student_attendance">Student Attendance</a>
    <a href="/fees">Fees</a>

    <hr style="color:white">

    <a href="/reports">Reports</a>

    <hr style="color:white">

    <a href="/backup">Backup</a>

</div>

<!-- MAIN -->
<div class="main">
    {% block content %}{% endblock %}
</div>

<script>
function toggleMenu(){
    document.getElementById("sidebar").classList.toggle("active");
    document.getElementById("overlay").classList.toggle("active");
}

function toggleTheme(){
    document.getElementById("body").classList.toggle("dark");
}
</script>

</body>
</html>
