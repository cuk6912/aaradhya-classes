<!DOCTYPE html>
<html>
<head>
    <title>Aaradhya Classes</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        /* Sidebar */
        .sidebar {
            height: 100vh;
            width: 250px;
            position: fixed;
            top: 0;
            left: 0;
            background: #2c3e50;
            padding-top: 20px;
            overflow-y: auto;
            transition: 0.3s;
        }

        .sidebar a {
            padding: 12px;
            display: block;
            color: white;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #34495e;
        }

        /* Main */
        .main-content {
            margin-left: 250px;
            padding: 20px;
        }

        /* Mobile */
        .menu-btn {
            display: none;
            font-size: 22px;
            background: #2c3e50;
            color: white;
            padding: 10px;
            border: none;
        }

        @media(max-width:768px){
            .sidebar {
                left: -250px;
            }

            .sidebar.active {
                left: 0;
            }

            .main-content {
                margin-left: 0;
            }

            .menu-btn {
                display: block;
            }
        }
    </style>
</head>

<body>

<!-- MENU BUTTON -->
<button class="menu-btn" onclick="toggleMenu()">☰ Menu</button>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">

    <h4 class="text-center text-white">Aaradhya</h4>

    <a href="/">Dashboard</a>
    <a href="/students">Students</a>
    <a href="/teachers">Teachers</a>
    <a href="/batches">Batches</a>

    <hr style="color:white">

    <a href="/attendance">Attendance</a>
    <a href="/fees">Fees</a>

    <hr style="color:white">

    <a href="/reports">Reports</a>

</div>

<!-- MAIN CONTENT -->
<div class="main-content">
    {% block content %}{% endblock %}
</div>

<script>
function toggleMenu(){
    document.getElementById("sidebar").classList.toggle("active");
}
</script>

</body>
</html>
