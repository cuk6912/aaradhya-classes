<!DOCTYPE html>
<html>
<head>

<title>Aaradhya Classes</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.sidebar{
width:220px;
height:100vh;
background:#2c3e50;
color:white;
position:fixed;
padding:20px;
}

.sidebar h2{
margin-top:0;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
margin:15px 0;
}

.sidebar a:hover{
background:#34495e;
padding-left:5px;
}

.main{
margin-left:240px;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#f1f1f1;
}

button{
background:#3498db;
color:white;
border:none;
padding:8px 12px;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#2980b9;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>Aaradhya Classes</h2>

<a href="/">Dashboard</a>
<a href="/students">Students</a>
<a href="#">Teachers</a>
<a href="#">Attendance</a>
<a href="#">Fees</a>
<a href="#">Reports</a>

</div>

<div class="main">

{% block content %}

{% endblock %}

</div>

</body>
</html>
