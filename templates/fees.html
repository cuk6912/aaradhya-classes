{% extends "layout.html" %}

{% block content %}

<h2 class="mb-4">Fee Management</h2>

<div class="card p-4 mb-4">

<h5>Record Payment</h5>

<form method="POST" action="/pay_fee">

<div class="row">

<div class="col-md-4">

<select class="form-control" name="student_id">

{% for s in students %}

<option value="{{s.id}}">
{{s.name}}
</option>

{% endfor %}

</select>

</div>

<div class="col-md-3">
<input class="form-control" name="amount" placeholder="Amount">
</div>

<div class="col-md-3">
<input class="form-control" name="month" placeholder="Month">
</div>

</div>

<button class="btn btn-success mt-3">Save Payment</button>

</form>

</div>

<div class="card p-4">

<h5>Payment History</h5>

<table class="table">

<tr>
<th>Student</th>
<th>Amount</th>
<th>Month</th>
<th>Date</th>
</tr>

{% for f in fees %}

<tr>

<td>{{f.student_id}}</td>
<td>{{f.amount}}</td>
<td>{{f.month}}</td>
<td>{{f.payment_date}}</td>

</tr>

{% endfor %}

</table>

</div>

{% endblock %}
