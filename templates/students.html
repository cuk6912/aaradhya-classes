{% extends "layout.html" %}

{% block content %}

<h2 class="mb-4">Student Management</h2>

<div class="card shadow mb-4">
<div class="card-body">

<h5>Add Student</h5>

<form method="POST" action="/add_student">

<div class="row">

<div class="col-md-4">
<label>Name</label>
<input class="form-control" name="name" required>
</div>

<div class="col-md-2">
<label>Class</label>
<select class="form-control" name="class">
<option>1st</option>
<option>2nd</option>
<option>3rd</option>
<option>4th</option>
<option>5th</option>
<option>6th</option>
<option>7th</option>
<option>8th</option>
<option>9th</option>
<option>10th</option>
<option>11th</option>
<option>12th</option>
</select>
</div>

<div class="col-md-3">
<label>Subject</label>
<select class="form-control" name="subject">
<option>All Subjects</option>
<option>Phonics</option>
<option>Abacus</option>
</select>
</div>

<div class="col-md-3">
<label>Phone</label>
<input class="form-control" name="phone">
</div>

</div>

<br>

<div class="row">

<div class="col-md-3">
<label>Monthly Fee</label>
<input class="form-control" name="fee">
</div>

<div class="col-md-2">
<br>
<button class="btn btn-primary">Add Student</button>
</div>

</div>

</form>

</div>
</div>

<div class="card shadow">

<div class="card-body">

<h5>Student List</h5>

<table class="table table-striped">

<tr>
<th>Name</th>
<th>Class</th>
<th>Subject</th>
<th>Phone</th>
<th>Fee</th>
</tr>

{% for s in students %}

<tr>
<td>{{s.name}}</td>
<td>{{s.student_class}}</td>
<td>{{s.subject}}</td>
<td>{{s.phone}}</td>
<td>₹{{s.monthly_fee}}</td>
</tr>

{% endfor %}

</table>

</div>

</div>

{% endblock %}
