{% extends "layout.html" %}

{% block content %}

<h2>Mark Attendance</h2>

<form method="POST" action="/save_attendance">

<table class="table">

<tr>
<th>Student</th>
<th>Present</th>
<th>Absent</th>
</tr>

{% for s in students %}

<tr>
<td>{{ s.name }}</td>

<td>
<input type="radio" name="student_{{ s.id }}" value="Present">
</td>

<td>
<input type="radio" name="student_{{ s.id }}" value="Absent">
</td>

</tr>

{% endfor %}

</table>

<button class="btn btn-success">Save Attendance</button>

</form>

{% endblock %}
